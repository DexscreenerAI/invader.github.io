<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Anonyme Agency</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fond animé */
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 380px;
            background: rgba(10, 15, 30, 0.95);
            border: 2px solid #00f2ff;
            border-radius: 16px;
            padding: 40px 35px;
            box-shadow:
                0 0 40px rgba(0, 242, 255, 0.15),
                0 0 80px rgba(0, 242, 255, 0.05),
                inset 0 0 30px rgba(0, 242, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        .login-logo h1 {
            color: #00f2ff;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .login-logo p {
            color: #555;
            font-size: 11px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #00f2ff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .input-group input::placeholder {
            color: #444;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f2ff, #0088ff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff4444;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            min-height: 18px;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #333;
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* Animation shake pour erreur */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="login-container" id="login-box">
        <div class="login-logo">
            <span class="icon">🎮</span>
            <h1>Anonyme Agency</h1>
            <p>Accès sécurisé</p>
        </div>

        <form id="login-form" onsubmit="return handleLogin(event)">
            <div class="input-group">
                <label>Identifiant</label>
                <input type="text" id="username" placeholder="Entrez votre identifiant" autocomplete="off" autofocus>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="Entrez votre mot de passe">
            </div>

            <button type="submit" class="login-btn">Connexion</button>
        </form>

        <div class="error-msg" id="error-msg"></div>

        <div class="footer">SYSTÈME PROTÉGÉ</div>
    </div>

    <script>
        // Hash SHA-256 des identifiants (pas en clair dans le code)
        const VALID_CREDENTIALS = [
            { user: '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918', pass: '4ffadff640ffd48d3f1893c710acaee4c32e20ff855fae87968abbd7f21e6b9a' },
            { user: 'f8470d87e0b49e11e8ac290d573eb337d2b8a4560761142445e2024c0dbd034c', pass: '5564b83bf8022ab883398679e0b7746c404ddd08250a2c55fdf4c6db97b6e98d' },
            { user: '5af9bd10428d5360be212cd3d68315844bf7ca0b4db31544e53ab5662783f3b0', pass: 'abb1879bdbda8df3f4c8cd945c154063cf81d5b67553d507fd43d8b7a15efc12' }
        ];

        // Token de session (hash unique pour vérifier la connexion)
        const SESSION_TOKEN = 'aa_authenticated_v1';

        // Si déjà connecté, rediriger
        if (sessionStorage.getItem('aa_session') === SESSION_TOKEN) {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            window.location.href = redirect;
        }

        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const box = document.getElementById('login-box');

            if (!username || !password) {
                errorEl.textContent = '⚠️ Remplissez tous les champs';
                return false;
            }

            const userHash = await sha256(username);
            const passHash = await sha256(password);

            if (VALID_CREDENTIALS.some(c => c.user === userHash && c.pass === passHash)) {
                // Connexion réussie
                sessionStorage.setItem('aa_session', SESSION_TOKEN);
                errorEl.style.color = '#00ff88';
                errorEl.textContent = '✅ Connexion réussie...';

                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                    window.location.href = redirect;
                }, 500);
            } else {
                // Échec
                errorEl.textContent = '❌ Identifiant ou mot de passe incorrect';
                box.classList.remove('shake');
                void box.offsetWidth;
                box.classList.add('shake');
            }

            return false;
        }

        // Enter pour valider
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin(e);
        });
    </script>
</body>
</html>
