function handleCharUpload(e){
  const f=e.target.files[0]; if(!f)return;
  charFile=f; charPreview=null; resultImg=null;
  const r=new FileReader();
  r.onload=ev=>{ charPreview=ev.target.result; render(); };
  r.readAsDataURL(f);
}

function clearChar(e){
  e.stopPropagation();
  charPreview=null; charFile=null; resultImg=null;
  render();
}

function pickStyle(id){ selectedStyle=id; resultImg=null; render(); }

function downloadResult(){
  if(!resultImg) return;
  const a=document.createElement('a'); a.href=resultImg; a.download=`banner-profile-${Date.now()}.png`; a.click();
}

function viewHistImg(ts){
  const h=history.find(x=>String(x.ts)===ts);
  if(h){ resultImg=h.img; render(); }
}

// ═══════════════════════════════════════════
// IMAGE COMPRESSION
// ═══════════════════════════════════════════
function compressImage(dataUrl, maxSize=800, quality=0.6){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;} }
      else { if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;} }
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',quality);
      resolve(compressed);
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
async function generate(){

  if(!OPENAI_API_KEY || OPENAI_API_KEY === "") {

  try {
    stepText='Compression de l\'image...'; render();
    const compressedChar = await compressImage(charPreview);
    const charB64 = compressedChar.split(",")[1];
    
    const bannerContent = {type:"image",source:{type:"url",url:BANNER_URL}};
    const charContent = {type:"image",source:{type:"base64",media_type:"image/jpeg",data:charB64}};

    stepText=`Analyse et création du prompt...`; render();
    
    const promptInstructions = `IMAGE 1 = a banner with a central space. IMAGE 2 = a profile picture of a person/subject.

Your job: write ONE single image generation prompt that recreates the EXACT same banner background from IMAGE 1, but seamlessly integrates the character from IMAGE 2 directly into the central space of the banner. 

Describe the character from IMAGE 2 in extreme visual detail.
Describe the banner background from IMAGE 1 in extreme detail.

Combine both into a single cohesive prompt, making sure to specify that the character is placed perfectly in the center. Add this style suffix at the end: ${style.suffix}

Output ONLY the raw prompt. No preamble, no explanation.`;

    // 1. Analyse via ton backend existant
    const res = await fetch(VISION_API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        max_tokens:400,
        messages:[{role:"user",content:[bannerContent, charContent, {type:"text",text:promptInstructions}]}]
      })
    });

    if(!res.ok){
      const txt=await res.text();
      throw new Error(`Erreur Vision API: ${res.status} — ${txt.slice(0,100)}`);
    }
    const d=await res.json();
    if(d.error) throw new Error(d.error.message || d.error);
    const generatedPrompt=(d.content||[]).map(c=>c.text||"").join("").trim();

    // 2. Génération via OpenAI (DALL-E 3)
    stepText=`Génération DALL-E 3...`; render();
    const imgRes = await fetch("https://api.openai.com/v1/images/generations",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${OPENAI_API_KEY}`
      },
      body:JSON.stringify({
        model:"dall-e-3",
        prompt:generatedPrompt,
        n:1,
        size:"1024x1024",
        response_format:"b64_json"
      })
    });
    
    const imgD=await imgRes.json();
    if(imgD.error) throw new Error(imgD.error.message||JSON.stringify(imgD.error));

    resultImg=`data:image/png;base64,${imgD.data[0].b64_json}`;
    history.unshift({img:resultImg,ts:Date.now()});
    
    if(history.length>15) history=history.slice(0,15);

  } catch(e) {
    errText=e.message;
  }
  
  loading=false; stepText=""; render();
}

render();
</script>
</body>
</html>
